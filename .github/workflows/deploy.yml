name: Deploy chieuthu.com

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Quartz doc ngay tao/sua tu lich su git

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cai dependencies
        run: npm ci --ignore-scripts

      - name: Cai Quartz plugins
        run: npx quartz plugin install

      - name: Build site
        # KHONG chay sync-publish o day: CI khong co vault.
        # content/ da duoc loc san va commit tu may local.
        run: npx quartz build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
